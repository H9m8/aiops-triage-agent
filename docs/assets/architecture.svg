<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="AIOps Incident-Triage Agent architecture">
  <style>
    .box  { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
    .agent{ fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
    .tool { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; }
    .data { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
    .gate { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
    .t    { fill: #0f172a; font-size: 14px; font-weight: 600; }
    .s    { fill: #475569; font-size: 11px; }
    .lbl  { fill: #64748b; font-size: 10px; }
    .arr  { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
    @media (prefers-color-scheme: dark) {
      .box  { fill: #1e293b; stroke: #64748b; }
      .agent{ fill: #2e1065; stroke: #a78bfa; }
      .tool { fill: #172554; stroke: #60a5fa; }
      .data { fill: #064e3b; stroke: #34d399; }
      .gate { fill: #431407; stroke: #fb923c; }
      .t    { fill: #f1f5f9; }
      .s    { fill: #cbd5e1; }
      .lbl  { fill: #94a3b8; }
      .arr  { stroke: #64748b; }
    }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="t" font-size="17">AIOps Incident-Triage Agent</text>

  <!-- pipeline top row -->
  <rect class="box" x="40"  y="60" width="150" height="50" rx="8"/>
  <text x="115" y="80"  text-anchor="middle" class="t">Alert webhook</text>
  <text x="115" y="97"  text-anchor="middle" class="s">monitoring / error log</text>

  <rect class="box" x="220" y="60" width="150" height="50" rx="8"/>
  <text x="295" y="80"  text-anchor="middle" class="t">Normalizer</text>
  <text x="295" y="97"  text-anchor="middle" class="s">fingerprint + signature</text>

  <rect class="agent" x="400" y="55" width="170" height="60" rx="10"/>
  <text x="485" y="80"  text-anchor="middle" class="t">AI Agent</text>
  <text x="485" y="98"  text-anchor="middle" class="s">gpt-4o-mini · ReAct loop</text>

  <line x1="190" y1="85" x2="218" y2="85" class="arr" marker-end="url(#a)"/>
  <line x1="370" y1="85" x2="398" y2="85" class="arr" marker-end="url(#a)"/>

  <!-- tools row -->
  <text x="485" y="140" text-anchor="middle" class="lbl">TOOLS (agent chooses)</text>
  <rect class="tool" x="270" y="150" width="135" height="48" rx="8"/>
  <text x="337" y="170" text-anchor="middle" class="t" font-size="13">Query logs</text>
  <text x="337" y="186" text-anchor="middle" class="s">parameterized SQL</text>

  <rect class="tool" x="417" y="150" width="135" height="48" rx="8"/>
  <text x="484" y="170" text-anchor="middle" class="t" font-size="13">Search runbooks</text>
  <text x="484" y="186" text-anchor="middle" class="s">pgvector RAG</text>

  <rect class="tool" x="564" y="150" width="135" height="48" rx="8"/>
  <text x="631" y="170" text-anchor="middle" class="t" font-size="13">Recent commits</text>
  <text x="631" y="186" text-anchor="middle" class="s">GitHub API</text>

  <line x1="485" y1="115" x2="485" y2="148" class="arr" marker-end="url(#a)"/>

  <!-- agent attachments -->
  <rect class="tool" x="710" y="55" width="150" height="48" rx="8"/>
  <text x="785" y="75"  text-anchor="middle" class="t" font-size="13">Postgres memory</text>
  <text x="785" y="91"  text-anchor="middle" class="s">recurrence by fingerprint</text>
  <line x1="570" y1="80" x2="708" y2="80" class="arr" marker-end="url(#a)"/>

  <!-- structured output -->
  <rect class="box" x="370" y="235" width="230" height="48" rx="8"/>
  <text x="485" y="255" text-anchor="middle" class="t" font-size="13">Structured RCA output</text>
  <text x="485" y="271" text-anchor="middle" class="s">schema-validated JSON</text>
  <line x1="485" y1="198" x2="485" y2="233" class="arr" marker-end="url(#a)"/>

  <!-- record incident -->
  <rect class="data" x="370" y="320" width="230" height="48" rx="8"/>
  <text x="485" y="340" text-anchor="middle" class="t" font-size="13">Record incident (upsert)</text>
  <text x="485" y="356" text-anchor="middle" class="s">occurrence_count++ on repeat</text>
  <line x1="485" y1="283" x2="485" y2="318" class="arr" marker-end="url(#a)"/>

  <!-- approval gate -->
  <rect class="gate" x="370" y="405" width="230" height="48" rx="8"/>
  <text x="485" y="425" text-anchor="middle" class="t" font-size="13">Human approval gate</text>
  <text x="485" y="441" text-anchor="middle" class="s">email · approve / decline</text>
  <line x1="485" y1="368" x2="485" y2="403" class="arr" marker-end="url(#a)"/>

  <!-- open issue -->
  <rect class="data" x="370" y="490" width="230" height="48" rx="8"/>
  <text x="485" y="510" text-anchor="middle" class="t" font-size="13">Open GitHub issue</text>
  <text x="485" y="526" text-anchor="middle" class="s">filed only after approval</text>
  <line x1="485" y1="453" x2="485" y2="488" class="arr" marker-end="url(#a)"/>

  <!-- data layer -->
  <rect class="data" x="660" y="320" width="200" height="118" rx="10" fill-opacity="0.35"/>
  <text x="760" y="342" text-anchor="middle" class="t" font-size="13">Supabase Postgres</text>
  <text x="760" y="358" text-anchor="middle" class="s">+ pgvector</text>
  <text x="760" y="384" text-anchor="middle" class="s">logs · incidents</text>
  <text x="760" y="402" text-anchor="middle" class="s">documents (vectors)</text>
  <text x="760" y="420" text-anchor="middle" class="s">chat memory</text>
  <line x1="600" y1="344" x2="658" y2="344" class="arr" marker-end="url(#a)"/>
</svg>
